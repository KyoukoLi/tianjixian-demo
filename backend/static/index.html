<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天际线</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 顶栏 -->
  <header class="header">
    <div class="header-icon">🌌</div>
    <div class="header-title">天际线</div>
    <div class="header-badge">Demo</div>
    <div class="header-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">初始化中</span>
    </div>
  </header>

  <!-- 主内容 -->
  <div class="main">

    <!-- 情绪卡片 -->
    <div class="emotion-card">
      <div class="emotion-icon" id="emotionIcon">🎭</div>
      <div class="emotion-info">
        <div class="emotion-tag">
          <span id="emotionTag">等待输入</span>
          <span id="emotionConf"></span>
        </div>
        <div class="emotion-desc" id="emotionDesc">说出你的感受，我来回应</div>
      </div>
      <div class="emotion-status" id="emotionStatus">就绪</div>
    </div>

    <!-- 聊天 -->
    <div class="chat" id="chatMessages">
      <!-- 消息动态插入 -->
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-row">
        <textarea
          id="messageInput"
          class="input-text"
          placeholder="说点什么... 支持 *动作* 语法，如：你好*微笑*"
          rows="1"
        ></textarea>
        <button class="btn btn-send" id="sendBtn">发送</button>
        <button class="btn btn-continue" id="continueBtn" disabled>继续</button>
      </div>
      <div class="hint">
        <span>输入 *动作* 可触发情绪渲染</span>
        <span class="freq" id="freqCounter">继续 0/3</span>
      </div>
    </div>

    <!-- 诊断折叠面板 -->
    <div class="debug-toggle" id="debugToggle" onclick="toggleDebug()">
      📡 诊断面板 <span id="debugToggleHint">(点击展开)</span>
    </div>
    <div class="debug-panel" id="debugPanel"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
