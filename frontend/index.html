<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>天际线</title>
  
<style>
/* =============================================
   天际线 Demo — 优化版样式
   ============================================= */

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0d14;
  --surface:   #161622;
  --card:      #1e1e2e;
  --border:    #2a2a3c;
  --purple:    #7c3aed;
  --purple-l:  #a78bfa;
  --green:     #34d399;
  --amber:     #fbbf24;
  --red:       #f87171;
  --blue:      #60a5fa;
  --text:      #e2e8f0;
  --text-dim:  #64748b;
  --text-mute: #334155;
}

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: fixed;
  width: 100%;
  top: 0;
  bottom: 0;
}

/* ── 顶栏 ── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-icon { font-size: 22px; }
.header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
.header-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 20px;
  background: var(--purple); color: white; font-weight: 500;
}
.header-status {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text-dim);
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-mute);
}
.dot.ok    { background: var(--green); }
.dot.wait  { background: var(--amber); animation: blink 1.5s ease-in-out infinite; }
.dot.err   { background: var(--red); }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity: 0.3; } }

/* ── 主容器 ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 600px;
  width: 100%;
  margin: 0 auto;
  padding: 0;
  overflow: hidden;
}

/* ── 情绪卡片 ── */
.emotion-card {
  margin: 12px 16px 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.emotion-icon { font-size: 32px; }
.emotion-info { flex: 1; }
.emotion-tag {
  font-size: 14px; font-weight: 600; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.emotion-tag span {
  font-size: 11px; font-weight: 400; color: var(--text-dim);
}
.emotion-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.emotion-status {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: var(--surface); color: var(--text-dim); border: 1px solid var(--border);
}
.emotion-status.ok    { color: var(--green); border-color: var(--green); }
.emotion-status.warn  { color: var(--amber); border-color: var(--amber); }
.emotion-status.fail  { color: var(--red); border-color: var(--red); }

/* ── 聊天区 ── */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; flex-direction: column; max-width: 85%; }
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.ai   { align-self: flex-start; align-items: flex-start; }

.msg-label {
  font-size: 11px; color: var(--text-mute);
  margin-bottom: 3px; padding: 0 4px;
}

.bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.6;
  word-break: break-word;
}

.msg.user .bubble {
  background: linear-gradient(135deg, var(--purple), #6d28d9);
  color: white;
  border-bottom-right-radius: 4px;
}

.msg.ai .bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}

.thinking {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 13px; padding: 8px 14px;
}
.thinking-dots span {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--text-dim);
  animation: bounce 1.2s infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

/* ── 输入区 ── */
.input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  touch-action: manipulation;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-text {
  flex: 1; background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 15px;
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 44px;
  max-height: 100px;
  font-family: inherit;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.input-text:focus { border-color: var(--purple-l); }
.input-text::placeholder { color: var(--text-mute); }

.btn {
  height: 44px; padding: 0 18px;
  border-radius: 10px; border: none;
  font-size: 14px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-send {
  background: var(--purple); color: white;
}
.btn-send:hover:not(:disabled) { background: #6d28d9; }
.btn-continue {
  background: var(--card); color: var(--text);
  border: 1px solid var(--border);
}
.btn-continue:hover:not(:disabled) { border-color: var(--purple-l); color: var(--purple-l); }
.btn-continue.blocked { color: var(--red); border-color: var(--red); }

.hint {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px; font-size: 11px; color: var(--text-mute);
}
.freq { color: var(--text-dim); }
.freq.warn { color: var(--amber); }
.freq.danger { color: var(--red); }

/* ── 诊断面板（折叠） */
.debug-toggle {
  padding: 8px 16px;
  font-size: 12px; color: var(--text-mute);
  cursor: pointer; background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  user-select: none;
  flex-shrink: 0;
}
.debug-toggle:hover { color: var(--text-dim); }
.debug-panel {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 8px 16px 12px;
  max-height: 200px;
  overflow-y: auto;
  font-family: "Courier New", monospace;
  font-size: 11px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  display: none;
}
.debug-panel.open { display: block; }
.d-line { padding: 2px 0; border-bottom: 1px solid var(--border); color: var(--text-dim); }
.d-line.tag   { color: var(--green); }
.d-line.err   { color: var(--red); }
.d-line.info  { color: var(--blue); }

</style>

<body>

  <!-- 顶栏 -->
  <header class="header">
    <div class="header-icon">🌌</div>
    <div class="header-title">天际线</div>
    <div class="header-badge">Demo</div>
    <div class="header-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">初始化中</span>
    </div>
  </header>

  <!-- 主内容 -->
  <div class="main">

    <!-- 情绪卡片 -->
    <div class="emotion-card">
      <div class="emotion-icon" id="emotionIcon">🎭</div>
      <div class="emotion-info">
        <div class="emotion-tag">
          <span id="emotionTag">等待输入</span>
          <span id="emotionConf"></span>
        </div>
        <div class="emotion-desc" id="emotionDesc">说出你的感受，我来回应</div>
      </div>
      <div class="emotion-status" id="emotionStatus">就绪</div>
      <button class="btn-reset" id="resetBtn" onclick="window.__reset&&window.__reset()">🔄</button>
    </div>

    <!-- 聊天 -->
    <div class="chat" id="chatMessages">
      <!-- 消息动态插入 -->
    </div>

    <!-- 快速情绪 -->
    <div class="quick-emotions">
      <button class="qe-btn" onclick="qeSend('*微笑* ')">😊</button>
      <button class="qe-btn" onclick="qeSend('*点头* ')">🙂</button>
      <button class="qe-btn" onclick="qeSend('*叹气* ')">😔</button>
      <button class="qe-btn" onclick="qeSend('*愤怒* ')">😠</button>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
        <textarea
          id="messageInput"
          class="input-text"
          placeholder="说点什么... 支持 *动作* 语法，如：你好*微笑*"
          rows="1"
        ></textarea>
        <button class="btn btn-send" id="sendBtn" onclick="window.__send&&window.__send()">发送</button>
        <button class="btn btn-continue" id="continueBtn" onclick="window.__continue&&window.__continue()" disabled>继续</button>
      </div>
      <div class="hint">
        <span>输入 *动作* 可触发情绪渲染</span>
        <span class="freq" id="freqCounter">继续 0/3</span>
      </div>
    </div>

    <!-- 诊断折叠面板 -->
    <div class="debug-toggle" id="debugToggle" onclick="toggleDebug()">
      📡 诊断面板 <span id="debugToggleHint">(点击展开)</span>
    </div>
    <div class="debug-panel" id="debugPanel"></div>

  </div>

  
<script>
/**
 * 天际线 Demo — 前端核心逻辑
 * 优化版：适配新 UI
 */
(function () {
  'use strict';

  const CONFIG = {
    API_BASE: 'https://tianjixian-demo-production.up.railway.app',
    CONTINUE_WINDOW_MS: 60_000,
    CONTINUE_LIMIT: 3,
    CONTINUE_COOLDOWN_MS: 30_000,
  };

  const state = {
    sessionId: crypto.randomUUID(),
    isStreaming: false,
    continueTimestamps: [],
    continueBlocked: false,
  };

  // DOM
  const $ = id => document.getElementById(id);
  const dom = {
    statusDot:    $('statusDot'),
    statusText:   $('statusText'),
    emotionIcon:  $('emotionIcon'),
    emotionTag:   $('emotionTag'),
    emotionConf:  $('emotionConf'),
    emotionDesc:  $('emotionDesc'),
    emotionStatus:$('emotionStatus'),
    chatMessages: $('chatMessages'),
    messageInput: $('messageInput'),
    sendBtn:      $('sendBtn'),
    continueBtn:  $('continueBtn'),
    freqCounter:  $('freqCounter'),
    debugPanel:   $('debugPanel'),
    debugToggle:  $('debugToggle'),
  };

  const missing = Object.entries(dom).filter(([, v]) => !v).map(([k]) => k);
  if (missing.length) {
    document.body.innerHTML = `<div style="padding:20px;color:#f87171">缺少元素: ${missing.join(', ')}</div>`;
    return;
  }

  // ── 日志 ──
  function log(msg, type) {
    const el = document.createElement('div');
    el.className = 'd-line ' + (type || '');
    el.textContent = new Date().toLocaleTimeString() + ' ' + msg;
    dom.debugPanel.appendChild(el);
    dom.debugPanel.scrollTop = dom.debugPanel.scrollHeight;
  }

  // ── 状态 ──
  function setStatus(text, dot) {
    dom.statusText.textContent = text;
    dom.statusDot.className = 'dot ' + (dot || '');
  }

  // ── 情绪卡片 ──
  const EMOTION_MAP = {
    neutral: { icon: '😐', desc: '情绪平稳，保持对话', color: 'ok' },
    happy:   { icon: '😊', desc: '心情愉悦，期待继续', color: 'ok' },
    sad:     { icon: '😢', desc: '情绪低落，需要关注', color: 'warn' },
    angry:   { icon: '😠', desc: '情绪激动，注意引导', color: 'warn' },
    curious: { icon: '🤔', desc: '好奇追问，深入交流', color: 'ok' },
    tired:   { icon: '😴', desc: '疲惫困倦，可能流失', color: 'warn' },
  };

  function setEmotion(tag, confidence) {
    const info = EMOTION_MAP[tag] || EMOTION_MAP.neutral;
    dom.emotionIcon.textContent = info.icon;
    dom.emotionTag.textContent = tag || '未知';
    dom.emotionConf.textContent = confidence ? ` ${Math.round(confidence*100)}%` : '';
    dom.emotionDesc.textContent = info.desc;
    dom.emotionStatus.textContent = confidence
      ? (confidence >= 0.8 ? '高置信' : confidence >= 0.5 ? '中置信' : '低置信')
      : '就绪';
    dom.emotionStatus.className = 'emotion-status ' + info.color;
  }

  // ── 消息 ──
  function addMessage(role, content, thinking) {
    if (thinking) {
      const el = document.createElement('div');
      el.className = 'msg ai';
      el.id = 'thinkingMsg';
      el.innerHTML = `<div class="msg-label">天际线</div><div class="bubble thinking"><div class="thinking-dots"><span></span><span></span><span></span></div>&nbsp;思考中...</div>`;
      dom.chatMessages.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerHTML = `<div class="msg-label">${role === 'user' ? '你' : '天际线'}</div><div class="bubble">${escapeHtml(content)}</div>`;
    dom.chatMessages.appendChild(el);
    el.scrollIntoView({ behavior: 'smooth' });
    return el;
  }

  function updateMessage(el, content) {
    el.querySelector('.bubble').textContent = content;
    el.scrollIntoView({ behavior: 'smooth' });
  }

  function removeThinking() {
    const t = document.getElementById('thinkingMsg');
    if (t) t.remove();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 诊断面板折叠 ──
  window.toggleDebug = function() {
    const panel = dom.debugPanel;
    const hint = document.getElementById('debugToggleHint');
    panel.classList.toggle('open');
    hint.textContent = panel.classList.contains('open') ? '(点击收起)' : '(点击展开)';
  };

  // ── 发送 ──
  function sendMessage(message) {
    if (state.isStreaming || !message.trim()) return;
    state.isStreaming = true;
    dom.sendBtn.disabled = true;
    dom.continueBtn.disabled = true;
    setStatus('思考中...', 'wait');
    removeThinking();

    addMessage('user', message);
    const aiEl = addMessage('ai', '', true);
    log('发送: ' + message, 'info');

    fetch(CONFIG.API_BASE + '/chat/poll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session_id: state.sessionId }),
    }).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(data => {
      log('收到 ' + data.events.length + ' 个事件', 'tag');
      let full = '';
      for (const ev of data.events) {
        switch (ev.type) {
          case 'emotion_tag':
            setEmotion(ev.data.tag, ev.data.confidence);
            log('情绪: ' + ev.data.tag + ' | 置信: ' + ev.data.confidence, 'tag');
            break;
          case 'chunk':
            full += ev.data.text;
            updateMessage(aiEl, full);
            break;
          case 'done':
            full = ev.data.full_text || full;
            log('完成: ' + full, 'tag');
            break;
          case 'error':
            log('错误: ' + ev.data.code + ' — ' + ev.data.message, 'err');
            updateMessage(aiEl, '⚠ ' + ev.data.message);
            break;
        }
      }
      updateMessage(aiEl, full || '(空)');
      setStatus('就绪', 'ok');
    }).catch(e => {
      log('请求失败: ' + e.message, 'err');
      updateMessage(aiEl, '⚠ ' + e.message);
      setStatus('连接失败', 'err');
    }).finally(() => {
      state.isStreaming = false;
      dom.sendBtn.disabled = false;
      dom.continueBtn.disabled = state.continueBlocked;
    });
  }

  // ── 频控 ──
  function checkContinue() {
    const now = Date.now();
    state.continueTimestamps = state.continueTimestamps.filter(t => now - t < CONFIG.CONTINUE_WINDOW_MS);
    if (state.continueBlocked) { log('继续已阻断（冷却中）', 'err'); return false; }
    if (state.continueTimestamps.length >= CONFIG.CONTINUE_LIMIT) {
      log('继续已阻断（窗口内已达上限）', 'err');
      triggerBlock(); return false;
    }
    state.continueTimestamps.push(now);
    updateFreqCounter();
    return true;
  }

  function triggerBlock() {
    state.continueBlocked = true;
    dom.continueBtn.disabled = true;
    dom.continueBtn.classList.add('blocked');
    dom.continueBtn.textContent = '⏸ 频繁';
    log('频控触发，30s 冷却', 'err');
    clearTimeout(state._cooldownTimer);
    state._cooldownTimer = setTimeout(() => {
      state.continueBlocked = false;
      state.continueTimestamps = [];
      dom.continueBtn.disabled = false;
      dom.continueBtn.classList.remove('blocked');
      dom.continueBtn.textContent = '继续';
      updateFreqCounter();
      log('频控冷却结束', 'tag');
    }, CONFIG.CONTINUE_COOLDOWN_MS);
  }

  function updateFreqCounter() {
    const c = state.continueTimestamps.length;
    const rem = CONFIG.CONTINUE_LIMIT - c;
    dom.freqCounter.textContent = '继续 ' + c + '/' + CONFIG.CONTINUE_LIMIT;
    dom.freqCounter.className = 'freq' + (rem <= 1 ? ' danger' : rem <= 2 ? ' warn' : '');
  }

  // ── 事件绑定 ──
  // 同时暴露到 window 作为 fallback（HTML onclick 属性）
  window.__send = () => {
    const t = dom.messageInput.value.trim();
    dom.messageInput.value = '';
    if (t) sendMessage(t);
  };
  window.__continue = () => {
    if (checkContinue()) sendMessage('【继续】');
  };
  // addEventListener 主绑定
  dom.sendBtn.addEventListener('click', window.__send);

  dom.messageInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      dom.sendBtn.click();
    }
  });

  dom.messageInput.addEventListener('input', () => {
    dom.messageInput.style.height = 'auto';
    dom.messageInput.style.height = Math.min(dom.messageInput.scrollHeight, 100) + 'px';
  });

  dom.continueBtn.addEventListener('click', () => {
    if (checkContinue()) sendMessage('【继续】');
  });

  // ── 初始化 ──
  setStatus('就绪', 'ok');
  setEmotion('neutral', null);
  updateFreqCounter();
  log('天际线 Demo 初始化完成', 'tag');
  log('API: ' + CONFIG.API_BASE, 'info');
  log('提示：发送 *动作* 语法可触发情绪渲染', 'info');

  // 启动时健康检查
  fetch(CONFIG.API_BASE + '/health')
    .then(r => r.json())
    .then(d => { log('后端健康: ' + JSON.stringify(d), 'tag'); setStatus('就绪', 'ok'); })
    .catch(e => { log('后端连接失败: ' + e.message, 'err'); setStatus('连接失败', 'err'); });

})();

</script>
<script>
/**
 * 天际线 Demo — 前端核心逻辑
 * 优化版：适配新 UI
 */
(function () {
  'use strict';

  const CONFIG = {

    CONTINUE_LIMIT: 3,
    CONTINUE_COOLDOWN_MS: 30_000,
  };

  const state = {
    sessionId: crypto.randomUUID(),

    continueTimestamps: [],

    statusDot:    $('statusDot'),

  function setStatus(text, dot) {
    dom.statusText.textContent = text;
    dom.statusDot.className = 'dot ' + (dot || '');
  }

  // ── 情绪卡片 ──
  const EMOTION_MAP = {
    neutral: { icon: '😐', desc: '情绪平稳，保持对话', color: 'ok' },
    happy:   { icon: '😊', desc: '心情愉悦，期待继续', color: 'ok' },
    sad:     { icon: '😢', desc: '情绪低落，需要关注', color: 'warn' },
    angry:   { icon: '😠', desc: '情绪激动，注意引导', color: 'warn' },
    curious: { icon: '🤔', desc: '好奇追问，深入交流', color: 'ok' },
    tired:   { icon: '😴', desc: '疲惫困倦，可能流失', color: 'warn' },
  };

  function setEmotion(tag, confidence) {
    const info = EMOTION_MAP[tag] || EMOTION_MAP.neutral;
    dom.emotionIcon.textContent = info.icon;
    dom.emotionTag.textContent = tag || '未知';
    dom.emotionConf.textContent = confidence ? ` ${Math.round(confidence*100)}%` : '';
    dom.emotionDesc.textContent = info.desc;
    dom.emotionStatus.textContent = confidence
      ? (confidence >= 0.8 ? '高置信' : confidence >= 0.5 ? '中置信' : '低置信')
      : '就绪';
    dom.emotionStatus.className = 'emotion-status ' + info.color;
  }

  // ── 消息 ──
  function addMessage(role, content, thinking) {
    if (thinking) {
      const el = document.createElement('div');
      el.className = 'msg ai';
      el.id = 'thinkingMsg';
      el.innerHTML = `<div class="msg-label">天际线</div><div class="bubble thinking"><div class="thinking-dots"><span></span><span></span><span></span></div>&nbsp;思考中...</div>`;
      dom.chatMessages.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      return el;
    }

    const el = document.createElement('div');

    dom.chatMessages.appendChild(el);
    el.scrollIntoView({ behavior: 'smooth' });
    return el;
  }

  function updateMessage(el, content) {
    el.querySelector('.bubble').textContent = content;
    el.scrollIntoView({ behavior: 'smooth' });
  }

  function removeThinking() {
    const t = document.getElementById('thinkingMsg');
    if (t) t.remove();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 诊断面板折叠 ──
  window.toggleDebug = function() {
    const panel = dom.debugPanel;
    const hint = document.getElementById('debugToggleHint');
    panel.classList.toggle('open');
    hint.textContent = panel.classList.contains('open') ? '(点击收起)' : '(点击展开)';
  };

  // ── 发送 ──
  function sendMessage(message) {
    if (state.isStreaming || !message.trim()) return;
    state.isStreaming = true;
    dom.sendBtn.disabled = true;
    dom.continueBtn.disabled = true;
    setStatus('思考中...', 'wait');
    removeThinking();

    addMessage('user', message);
    const aiEl = addMessage('ai', '', true);
    log('发送: ' + message, 'info');

    fetch(CONFIG.API_BASE + '/chat/poll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, session_id: state.sessionId }),
    }).then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(data => {
      log('收到 ' + data.events.length + ' 个事件', 'tag');
      let full = '';
      for (const ev of data.events) {
        switch (ev.type) {
          case 'emotion_tag':
            setEmotion(ev.data.tag, ev.data.confidence);
            log('情绪: ' + ev.data.tag + ' | 置信: ' + ev.data.confidence, 'tag');
            break;
          case 'chunk':
            full += ev.data.text;
            updateMessage(aiEl, full);
            break;
          case 'done':
            full = ev.data.full_text || full;
            log('完成: ' + full, 'tag');
            break;
          case 'error':
            log('错误: ' + ev.data.code + ' — ' + ev.data.message, 'err');
            updateMessage(aiEl, '⚠ ' + ev.data.message);
            break;
        }
      }
      updateMessage(aiEl, full || '(空)');
      setStatus('就绪', 'ok');
    }).catch(e => {
      log('请求失败: ' + e.message, 'err');
      updateMessage(aiEl, '⚠ ' + e.message);
      setStatus('连接失败', 'err');
    }).finally(() => {
      state.isStreaming = false;
      dom.sendBtn.disabled = false;
      dom.continueBtn.disabled = state.continueBlocked;
    });
  }

  // ── 频控 ──
  function checkContinue() {
    const now = Date.now();
    state.continueTimestamps = state.continueTimestamps.filter(t => now - t < CONFIG.CONTINUE_WINDOW_MS);
    if (state.continueBlocked) { log('继续已阻断（冷却中）', 'err'); return false; }
    if (state.continueTimestamps.length >= CONFIG.CONTINUE_LIMIT) {
      log('继续已阻断（窗口内已达上限）', 'err');
      triggerBlock(); return false;
    }
    state.continueTimestamps.push(now);
    updateFreqCounter();

  function triggerBlock() {
    state.continueBlocked = true;
    dom.continueBtn.disabled = true;
    dom.continueBtn.classList.add('blocked');

    state._cooldownTimer = setTimeout(() => {
      state.continueBlocked = false;
      state.continueTimestamps = [];
      dom.continueBtn.disabled = false;
      dom.continueBtn.classList.remove('blocked');
      dom.continueBtn.textContent = '继续';
      updateFreqCounter();
      log('频控冷却结束', 'tag');

    const rem = CONFIG.CONTINUE_LIMIT - c;
    dom.freqCounter.textContent = '继续 ' + c + '/' + CONFIG.CONTINUE_LIMIT;
    dom.freqCounter.className = 'freq' + (rem <= 1 ? ' danger' : rem <= 2 ? ' warn' : '');

  window.__reset = () => {

    dom.messageInput.value = '';

    dom.continueBtn.disabled = false;
