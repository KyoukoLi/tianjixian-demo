<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天际线 — 角色编辑器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="persona_editor.css">
  <link rel="stylesheet" href="persona_editor.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14; --surface: #161622; --card: #1e1e2e;
      --border: #2a2a3c; --purple: #7c3aed; --purple-l: #a78bfa;
      --amber: #fbbf24; --green: #34d399; --red: #f87171;
      --text: #e2e8f0; --text-dim: #64748b; --text-mute: #334155;
    }
    body {
      font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 16px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .header-icon { font-size: 24px; }
    .header-title { font-size: 18px; font-weight: 600; }
    .header-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--purple); color: white; }
    .main { max-width: 700px; margin: 0 auto; }
    .editor-tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
    }
    .tab-btn {
      flex: 1; height: 36px; border: none; border-radius: 8px;
      background: transparent; color: var(--text-dim); font-size: 14px;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: var(--purple); color: white; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-icon">🌌</div>
    <div class="header-title">天际线 <span id="appVersion" style="font-size:11px;opacity:0.6">v0.3.2</span></div>
    <div class="header-badge" id="buildTag">🚀 就绪</div>
  </header>

  <div class="main">
    <div class="editor-tabs">
      <button class="tab-btn active" onclick="switchTab('persona')">👤 角色编辑器</button>
      <button class="tab-btn" onclick="switchTab('story')">📖 故事大纲</button>
    </div>

    <div class="tab-panel active" id="tab-persona">
      <div id="personaEditor"></div>
    </div>

    <div class="tab-panel" id="tab-story">
      <div id="storyEditor"></div>
    </div>

    <div class="story-section" style="margin-top:16px">
      <div class="story-section-title">发送测试</div>
      <div style="display:flex;gap:8px">
        <input type="text" id="testInput" placeholder="输入对话内容，点击发送测试..." style="flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;color:var(--text);outline:none" onkeydown="if(event.key==='Enter')document.getElementById('testBtn').click()">
        <button id="testBtn" onclick="runTest()" style="height:40px;padding:0 20px;background:var(--purple);color:white;border:none;border-radius:8px;font-size:14px;cursor:pointer">发送</button>
      </div>
      <div id="testOutput" style="margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:60px;font-size:14px;white-space:pre-wrap;word-break:break-all;display:none"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="persona_editor.js"></script>
  <script src="story_editor.js"></script>
  <script>
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab-btn[onclick="switchTab('${name}')"]`).classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }
    async function runTest() {
      const input = document.getElementById('testInput').value.trim();
      const output = document.getElementById('testOutput');
      if (!input) return;
      output.style.display = 'block';
      output.textContent = '⏳ 正在发送...\n\n';

      const persona = (window.PersonaEditor && window.PersonaEditor.getPersona) ? window.PersonaEditor.getPersona() : null;
      const story = (window.StoryEditor && window.StoryEditor.getStory) ? window.StoryEditor.getStory() : null;

      try {
        const res = await fetch('/chat/poll', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: input, persona, story }),
        });
        const data = await res.json();
        const events = data.events || [];
        const done = events.find(e => e.type === 'done');
        const emotionTag = done ? done.data.emotion_tag : '?';
        const reply = done ? done.data.full_text : '(无回复)';

        output.innerHTML = `<span style="color:#a78bfa">【角色】</span> ${persona && persona.name ? persona.name : '(未设置)'}
<span style="color:#a78bfa">【故事】</span> ${story && story.genre ? story.genre : '(未设置)'}
<span style="color:#a78bfa">【用户输入】</span> ${input}

<span style="color:#34d399">【AI 回复】</span> ${reply}
<span style="color:#fbbf24">【情绪标签】</span> ${emotionTag}
<span style="color:#64748b;font-size:12px">version: ${data.version || '?'} | events: ${events.length}</span>`;
      } catch (err) {
        output.textContent = '❌ 请求失败: ' + err.message;
      }
    }
  </script>
</body>
</html>
